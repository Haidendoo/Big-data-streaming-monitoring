apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: vdt-lakehouse
servers: 1
agents: 3
image: rancher/k3s:v1.27.4-k3s1
ports:
  - port: 9000-9001:9000-9001
    nodeFilters:
      - loadbalancer
  - port: 8443:8443
    nodeFilters:
      - loadbalancer
  - port: 8081:8081
    nodeFilters:
      - loadbalancer
  - port: 8080:8080
    nodeFilters:
      - loadbalancer
  - port: 8888:8888
    nodeFilters:
      - loadbalancer
  - port: 9080:9080
    nodeFilters:
      - loadbalancer
  - port: 9092:9092
    nodeFilters:
      - loadbalancer
  - port: 3000:80 # Mapping Grafana host 3000 to LB 80
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "300s"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
registries:
  create:
    name: k3d-vdt-registry
    host: "0.0.0.0"
    hostPort: "5000"
