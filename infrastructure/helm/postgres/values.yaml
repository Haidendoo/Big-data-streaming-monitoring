# PostgreSQL Official Image Configuration
global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: postgres
  tag: 16-alpine

# Map official env vars
primary:
  extraEnvVars:
    - name: POSTGRES_USER
      value: "hive"
    - name: POSTGRES_PASSWORD
      value: "password123"
    - name: POSTGRES_DB
      value: "metastore"

auth:
  database: metastore
  username: hive
  password: password123

persistence:
  size: 2Gi

resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi
