adminPassword: admin

# Load environment variables (including SMTP settings) from a Kubernetes Secret
envFromSecret: "grafana-smtp-secret"

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - disableDeletion: false
      editable: true
      folder: ''
      name: default
      options:
        path: /var/lib/grafana/dashboards/default
      orgId: 1
      type: file
dashboards:
  default:
