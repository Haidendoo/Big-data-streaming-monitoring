        BY ts", "refId": "A"}], "fieldConfig": {"defaults": {"custom": {"drawStyle":
        "line", "lineInterpolation": "smooth"}, "unit": "percent", "min": 0, "max":
        100}}}, {"title": "Disk Utilization (%)", "type": "timeseries", "id": 3, "gridPos":
