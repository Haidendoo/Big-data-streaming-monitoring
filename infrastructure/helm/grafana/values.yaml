        & Alerts", "type": "dashboard"}]}, "editable": true, "fiscalYearStartMonth":
        0, "graphTooltip": 1, "id": null, "links": [], "liveNow": false, "panels":
        [{"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id":
        10, "title": "System Performance Metrics (Iceberg Lakehouse)", "type": "row"},
        {"title": "CPU Utilization (%)", "type": "timeseries", "id": 1, "gridPos":
