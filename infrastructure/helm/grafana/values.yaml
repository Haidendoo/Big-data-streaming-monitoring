        WHERE rn = 1 ORDER BY server_id", "refId": "A"}]}], "refresh": "10s", "schemaVersion":
        38, "style": "dark", "tags": ["lakehouse", "monitoring"], "templating": {"list":
        []}, "time": {"from": "now-2h", "to": "now"}, "timepicker": {}, "timezone":
