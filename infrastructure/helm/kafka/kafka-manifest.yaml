apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-jmx-config
  namespace: streaming
data:
  kafka-config.yml: |
    lowercaseOutputName: true
    rules:
      - pattern: kafka.server<type=(.+)><>([^:]+)
        name: kafka_server_$1_$2
      - pattern: kafka.server<type=(.+), name=(.+)><>([^:]+)
        name: kafka_server_$1_$2_$3
      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+)><>([^:]+)
        name: kafka_server_$1_$2_$4
        labels:
          topic: "$3"
      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+), partition=(.+)><>([^:]+)
        name: kafka_server_$1_$2_$5
        labels:
          topic: "$3"
          partition: "$4"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: streaming
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - port: 9092
    name: broker
    targetPort: 9092
  - port: 9093
    name: controller
    targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: streaming
spec:
  serviceName: "kafka"
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
      - name: download-jmx-exporter
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          wget -q -O /usr/share/jmx_exporter/jmx_prometheus_javaagent.jar https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.19.0/jmx_prometheus_javaagent-0.19.0.jar
        volumeMounts:
        - name: jmx-agent
          mountPath: /usr/share/jmx_exporter
      containers:
      - name: kafka
        image: apache/kafka:latest
        command:
        - /bin/sh
        - -c
        - |
          POD_INDEX=$(hostname | awk -F'-' '{print $NF}')
          export KAFKA_NODE_ID=$((POD_INDEX + 1))
          export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://kafka-${POD_INDEX}.kafka.streaming.svc.cluster.local:9092"
          export KAFKA_CONTROLLER_QUORUM_VOTERS="1@kafka-0.kafka.streaming.svc.cluster.local:9093,2@kafka-1.kafka.streaming.svc.cluster.local:9093,3@kafka-2.kafka.streaming.svc.cluster.local:9093"
          exec /etc/kafka/docker/run
        env:
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://:9092,CONTROLLER://:9093"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "false"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "2"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        - name: KAFKA_OPTS
          value: "-javaagent:/usr/share/jmx_exporter/jmx_prometheus_javaagent.jar=9404:/etc/jmx_exporter/kafka-config.yml"
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 9093
          name: controller
        - containerPort: 9404
          name: metrics
        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data
        - name: jmx-agent
          mountPath: /usr/share/jmx_exporter
        - name: jmx-config
          mountPath: /etc/jmx_exporter
      volumes:
      - name: jmx-agent
        emptyDir: {}
      - name: jmx-config
        configMap:
          name: kafka-jmx-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
