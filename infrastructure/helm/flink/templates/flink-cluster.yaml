        ports:
        - containerPort: 9249
          name: metrics
        resources:
          {{- toYaml .Values.taskmanager.resources | nindent 10 }}
        volumeMounts:
        - name: shared-lib
          mountPath: /opt/flink/usrlib
      volumes:
      - name: shared-lib
        emptyDir: {}
