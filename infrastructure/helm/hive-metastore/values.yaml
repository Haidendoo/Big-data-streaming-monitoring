# Hive Metastore Configuration
image:
  repository: apache/hive-metastore
  tag: "3.1.2"

service:
  type: ClusterIP
  port: 9083

# Cấu hình kết nối Database (Postgres đã tạo ở bước trước)
database:
  type: postgres
  host: hive-db-postgresql.lakehouse.svc.cluster.local
  port: 5432
  dbName: metastore
  user: hive
  password: hivepassword

# Cấu hình lưu trữ Warehouse (Minio)
warehouse:
  path: s3a://warehouse/
  s3:
    endpoint: http://minio.lakehouse.svc.cluster.local:9000
    accessKey: admin
    secretKey: password123

resources:
  limits:
    memory: 1Gi
  requests:
    memory: 512Mi
