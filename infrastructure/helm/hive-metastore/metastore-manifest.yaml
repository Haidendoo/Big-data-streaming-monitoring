apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
      - name: hive-metastore
        image: bitsondatadev/hive-metastore:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          export HADOOP_HOME=/opt/hadoop-3.2.0
          export HADOOP_CLASSPATH=${HADOOP_HOME}/share/hadoop/tools/lib/aws-java-sdk-bundle-1.11.375.jar:${HADOOP_HOME}/share/hadoop/tools/lib/hadoop-aws-3.2.0.jar
          export JAVA_HOME=/usr/local/openjdk-8
          
          echo "📥 Downloading PostgreSQL JDBC driver..."
          wget -q -O /opt/apache-hive-metastore-3.0.0-bin/lib/postgresql-42.6.0.jar https://repo1.maven.org/maven2/org/postgresql/postgresql/42.6.0/postgresql-42.6.0.jar
          
          echo "⚙️ Creating metastore-site.xml..."
          cat <<EOF > /opt/apache-hive-metastore-3.0.0-bin/conf/metastore-site.xml
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
          <configuration>
            <property>
              <name>metastore.thrift.uris</name>
              <value>thrift://0.0.0.0:9083</value>
            </property>
            <property>
              <name>javax.jdo.option.ConnectionDriverName</name>
              <value>org.postgresql.Driver</value>
            </property>
            <property>
              <name>javax.jdo.option.ConnectionURL</name>
              <value>jdbc:postgresql://hive-db-postgresql:5432/metastore</value>
            </property>
            <property>
              <name>javax.jdo.option.ConnectionUserName</name>
              <value>hive</value>
            </property>
            <property>
              <name>javax.jdo.option.ConnectionPassword</name>
              <value>password123</value>
            </property>
            <property>
              <name>metastore.task.threads.always</name>
              <value>org.apache.hadoop.hive.metastore.events.EventCleanerTask</value>
            </property>
            <property>
              <name>metastore.expression.proxy</name>
              <value>org.apache.hadoop.hive.metastore.DefaultPartitionExpressionProxy</value>
            </property>
            <property>
              <name>metastore.warehouse.dir</name>
              <value>s3a://landing-zone/lakehouse/</value>
            </property>
            <property>
              <name>fs.s3a.access.key</name>
              <value>admin</value>
            </property>
            <property>
              <name>fs.s3a.secret.key</name>
              <value>password123</value>
            </property>
            <property>
              <name>fs.s3a.endpoint</name>
              <value>http://minio.lakehouse.svc.cluster.local:9000</value>
            </property>
            <property>
              <name>fs.s3a.path.style.access</name>
              <value>true</value>
            </property>
          </configuration>
          EOF
          
          echo "🔌 Waiting for PostgreSQL on hive-db-postgresql:5432..."
          while ! nc -z hive-db-postgresql 5432; do
            sleep 1
          done
          echo "PostgreSQL started"
          
          echo "🛠️ Initializing Metastore Schema..."
          /opt/apache-hive-metastore-3.0.0-bin/bin/schematool -initSchema -dbType postgres || echo "Schema already initialized or failed"
          
          echo "🚀 Starting Hive Metastore..."
          exec /opt/apache-hive-metastore-3.0.0-bin/bin/start-metastore
        ports:
        - containerPort: 9083
          name: thrift
        resources:
          limits:
            memory: 800Mi
          requests:
            memory: 400Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: lakehouse
spec:
  selector:
    app: hive-metastore
  ports:
  - port: 9083
    targetPort: 9083
    name: thrift
