apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow
  namespace: orchestration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pod-runner
  namespace: orchestration
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status"]
  verbs: ["create", "get", "list", "watch", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-pod-runner
  namespace: orchestration
subjects:
- kind: ServiceAccount
  name: airflow
  namespace: orchestration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-pod-runner
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
  namespace: orchestration
data:
  server_monitoring_batch.py: |
    from datetime import datetime, timedelta

    from airflow import DAG
    from airflow.providers.cncf.kubernetes.operators.pod import KubernetesPodOperator
    from kubernetes.client import models as k8s

    DEFAULT_PACKAGES = (
        "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,"
        "org.apache.hadoop:hadoop-aws:3.3.4,"
        "com.amazonaws:aws-java-sdk-bundle:1.12.262"
    )

    SPARK_CONF = [
        "--conf", "spark.sql.catalog.iceberg=org.apache.iceberg.spark.SparkCatalog",
        "--conf", "spark.sql.catalog.iceberg.type=hive",
        "--conf", "spark.sql.catalog.iceberg.uri=thrift://hive-metastore.lakehouse.svc.cluster.local:9083",
        "--conf", "spark.sql.catalog.iceberg.warehouse=s3a://lakehouse/lakehouse/",
        "--conf", "spark.hadoop.fs.s3a.endpoint=http://minio.lakehouse.svc.cluster.local:9000",
        "--conf", "spark.hadoop.fs.s3a.access.key=admin",
        "--conf", "spark.hadoop.fs.s3a.secret.key=password123",
        "--conf", "spark.hadoop.fs.s3a.path.style.access=true",
        "--conf", "spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem",
        "--conf", "spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions",
        "--conf", "spark.sql.shuffle.partitions=6",
        "--conf", "spark.jars.ivy=/tmp/.ivy",
        "--conf", "spark.driver.extraJavaOptions=-Divy.cache.dir=/tmp/.ivy/cache -Djava.net.preferIPv4Stack=true",
        "--conf", "spark.executor.extraJavaOptions=-Djava.net.preferIPv4Stack=true",
        "--conf", "spark.driver.host=$(SPARK_LOCAL_IP)",
    ]

    SPARK_BASE_ARGS = [
        "--master", "spark://spark-master:7077",
        "--deploy-mode", "client",
        "--packages", DEFAULT_PACKAGES,
        "--executor-cores", "1",
        "--executor-memory", "512m",
        "--driver-memory", "512m",
        "--total-executor-cores", "3",
    ] + SPARK_CONF

    JOB_VOLUME = k8s.V1Volume(
        name="spark-batch-jobs",
        config_map=k8s.V1ConfigMapVolumeSource(name="spark-batch-jobs"),
    )
    JOB_VOLUME_MOUNT = k8s.V1VolumeMount(
        name="spark-batch-jobs",
        mount_path="/opt/spark/jobs",
        read_only=True,
    )

    default_args = {
        "owner": "data-platform",
        "depends_on_past": False,
        "retries": 1,
        "retry_delay": timedelta(minutes=5),
    }

    with DAG(
        dag_id="server_monitoring_hourly_kpi",
        default_args=default_args,
        description="Aggregate raw server metrics into Iceberg gold KPI table every hour.",
        schedule="0 * * * *",
        start_date=datetime(2026, 1, 1),
        catchup=False,
        max_active_runs=1,
        tags=["lakehouse", "spark", "batch"],
    ) as dag:
        KubernetesPodOperator(
            task_id="aggregate_kpi_summary",
            namespace="orchestration",
            image="apache/spark:3.5.1",
            cmds=["/opt/spark/bin/spark-submit"],
            arguments=SPARK_BASE_ARGS
            + ["/opt/spark/jobs/server_monitoring_kpi_batch.py", "--lookback-hours", "1"],
            volumes=[JOB_VOLUME],
            volume_mounts=[JOB_VOLUME_MOUNT],
            env_vars=[
                k8s.V1EnvVar(name="SPARK_MASTER_PORT", value="7077"),
                k8s.V1EnvVar(
                    name="SPARK_LOCAL_IP",
                    value_from=k8s.V1EnvVarSource(
                        field_ref=k8s.V1ObjectFieldSelector(field_path="status.podIP")
                    ),
                ),
            ],
            container_resources=k8s.V1ResourceRequirements(
                requests={"cpu": "100m", "memory": "512Mi"},
                limits={"cpu": "500m", "memory": "1024Mi"},
            ),
            get_logs=True,
            is_delete_operator_pod=True,
            in_cluster=True,
        )

    with DAG(
        dag_id="server_monitoring_daily_compaction",
        default_args=default_args,
        description="Compact small Iceberg files generated by realtime writes.",
        schedule="0 0 * * *",
        start_date=datetime(2026, 1, 1),
        catchup=False,
        max_active_runs=1,
        tags=["lakehouse", "spark", "maintenance"],
    ) as dag:
        KubernetesPodOperator(
            task_id="compact_raw_sftp_table",
            namespace="orchestration",
            image="apache/spark:3.5.1",
            cmds=["/opt/spark/bin/spark-submit"],
            arguments=SPARK_BASE_ARGS + ["/opt/spark/jobs/iceberg_compaction.py"],
            volumes=[JOB_VOLUME],
            volume_mounts=[JOB_VOLUME_MOUNT],
            env_vars=[
                k8s.V1EnvVar(name="SPARK_MASTER_PORT", value="7077"),
                k8s.V1EnvVar(
                    name="SPARK_LOCAL_IP",
                    value_from=k8s.V1EnvVarSource(
                        field_ref=k8s.V1ObjectFieldSelector(field_path="status.podIP")
                    ),
                ),
            ],
            container_resources=k8s.V1ResourceRequirements(
                requests={"cpu": "100m", "memory": "512Mi"},
                limits={"cpu": "500m", "memory": "1024Mi"},
            ),
            get_logs=True,
            is_delete_operator_pod=True,
            in_cluster=True,
        )
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-batch-jobs
  namespace: orchestration
data:
  server_monitoring_kpi_batch.py: |
    import argparse

    from pyspark.sql import SparkSession
    from pyspark.sql.functions import avg, col, date_trunc, expr, max as spark_max


    def parse_args():
        parser = argparse.ArgumentParser()
        parser.add_argument("--lookback-hours", type=int, default=1)
        return parser.parse_args()


    def main():
        args = parse_args()
        spark = (
            SparkSession.builder.appName("server-monitoring-kpi-batch")
            .enableHiveSupport()
            .getOrCreate()
        )

        raw = spark.table("iceberg.monitoring.raw_sftp_table")
        dim = spark.table("iceberg.monitoring.server_config")

        lower_bound = expr(f"current_timestamp() - INTERVAL {args.lookback_hours} HOURS")
        batch = raw.where(col("ts") >= lower_bound)

        summary = (
            batch.join(dim, "server_id", "inner")
            .withColumn("window_start", date_trunc("hour", col("ts")))
            .withColumn("window_end", col("window_start") + expr("INTERVAL 1 HOUR"))
            .groupBy("window_start", "window_end", "province", "station")
            .agg(
                avg("cpu_util").alias("avg_cpu_util"),
                spark_max("ram_util").alias("max_ram_util"),
                avg("disk_util").alias("avg_disk_util"),
                avg("io_stat").alias("avg_io_stat"),
            )
        )

        summary.createOrReplaceTempView("kpi_summary_delta")
        spark.sql(
            """
            MERGE INTO iceberg.monitoring.kpi_summary t
            USING kpi_summary_delta s
            ON t.window_start = s.window_start
              AND t.window_end = s.window_end
              AND t.province = s.province
              AND t.station = s.station
            WHEN MATCHED THEN UPDATE SET
              avg_cpu_util = s.avg_cpu_util,
              max_ram_util = s.max_ram_util,
              avg_disk_util = s.avg_disk_util,
              avg_io_stat = s.avg_io_stat
            WHEN NOT MATCHED THEN INSERT *
            """
        )

        spark.stop()


    if __name__ == "__main__":
        main()

  iceberg_compaction.py: |
    from pyspark.sql import SparkSession


    def main():
        spark = (
            SparkSession.builder.appName("server-monitoring-iceberg-compaction")
            .enableHiveSupport()
            .getOrCreate()
        )

        spark.sql(
            """
            CALL iceberg.system.rewrite_data_files(
              table => 'monitoring.raw_sftp_table',
              options => map('target-file-size-bytes', '134217728')
            )
            """
        )

        spark.stop()


    if __name__ == "__main__":
        main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      serviceAccountName: airflow
      initContainers:
      - name: init-airflow-db
        image: apache/airflow:3.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: SequentialExecutor
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: sqlite:////opt/airflow/airflow.db
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir apache-airflow-providers-cncf-kubernetes
          mkdir -p /opt/airflow
          echo '{"admin": "admin"}' > /opt/airflow/simple_auth_manager_passwords.json.generated
          airflow db migrate
        volumeMounts:
        - name: airflow-home
          mountPath: /opt/airflow
        - name: airflow-dags
          mountPath: /opt/airflow/dags/server_monitoring_batch.py
          subPath: server_monitoring_batch.py
        - name: spark-batch-jobs
          mountPath: /opt/airflow/jobs
      containers:
      - name: airflow-api-server
        image: apache/airflow:3.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: SequentialExecutor
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: sqlite:////opt/airflow/airflow.db
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          value: server-monitoring-lakehouse
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir apache-airflow-providers-cncf-kubernetes
          exec airflow api-server --workers 1
        ports:
        - containerPort: 8080
          name: web
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1280Mi
        volumeMounts:
        - name: airflow-home
          mountPath: /opt/airflow
        - name: airflow-dags
          mountPath: /opt/airflow/dags/server_monitoring_batch.py
          subPath: server_monitoring_batch.py
        - name: spark-batch-jobs
          mountPath: /opt/airflow/jobs
      - name: airflow-scheduler
        image: apache/airflow:3.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: SequentialExecutor
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: sqlite:////opt/airflow/airflow.db
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          value: server-monitoring-lakehouse
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir apache-airflow-providers-cncf-kubernetes
          exec airflow scheduler
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1280Mi
        volumeMounts:
        - name: airflow-home
          mountPath: /opt/airflow
        - name: airflow-dags
          mountPath: /opt/airflow/dags/server_monitoring_batch.py
          subPath: server_monitoring_batch.py
        - name: spark-batch-jobs
          mountPath: /opt/airflow/jobs
      - name: airflow-dag-processor
        image: apache/airflow:3.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: SequentialExecutor
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: sqlite:////opt/airflow/airflow.db
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          value: server-monitoring-lakehouse
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir apache-airflow-providers-cncf-kubernetes
          exec airflow dag-processor
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 250m
            memory: 768Mi
        volumeMounts:
        - name: airflow-home
          mountPath: /opt/airflow
        - name: airflow-dags
          mountPath: /opt/airflow/dags/server_monitoring_batch.py
          subPath: server_monitoring_batch.py
        - name: spark-batch-jobs
          mountPath: /opt/airflow/jobs
      volumes:
      - name: airflow-home
        emptyDir: {}
      - name: airflow-dags
        configMap:
          name: airflow-dags
      - name: spark-batch-jobs
        configMap:
          name: spark-batch-jobs
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: orchestration
spec:
  type: LoadBalancer
  selector:
    app: airflow
  ports:
  - name: web
    port: 8082
    targetPort: 8080
