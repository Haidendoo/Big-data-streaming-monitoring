apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lakehouse
spec:
  type: LoadBalancer
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: lakehouse
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: lakehouse
spec:
  serviceName: "minio-headless"
  replicas: 4
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        command: ["/bin/sh", "-ce"]
        args:
        - |
          minio server \
            http://minio-0.minio-headless.lakehouse.svc.cluster.local:9000/data \
            http://minio-1.minio-headless.lakehouse.svc.cluster.local:9000/data \
            http://minio-2.minio-headless.lakehouse.svc.cluster.local:9000/data \
            http://minio-3.minio-headless.lakehouse.svc.cluster.local:9000/data \
            --console-address :9001
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          value: "password123"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
