apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
      - name: nifi
        image: apache/nifi:2.0.0
        ports:
        - containerPort: 8443
        env:
        - name: SINGLE_USER_CREDENTIALS_USERNAME
          value: "admin"
        - name: SINGLE_USER_CREDENTIALS_PASSWORD
          value: "password123456"
---
apiVersion: v1
kind: Service
metadata:
  name: nifi
  namespace: ingestion
spec:
  type: LoadBalancer
  selector:
    app: nifi
  ports:
  - name: https
    port: 8443
    targetPort: 8443
