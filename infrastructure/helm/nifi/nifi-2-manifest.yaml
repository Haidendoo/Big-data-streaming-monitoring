apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
      - name: nifi
        image: apache/nifi:2.0.0-M4
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
        env:
        - name: NIFI_WEB_HTTP_HOST
          value: "0.0.0.0"
        - name: NIFI_WEB_HTTP_PORT
          value: "8080"
        - name: NIFI_WEB_HTTPS_HOST
          value: "0.0.0.0"
        - name: NIFI_WEB_HTTPS_PORT
          value: "8443"
        - name: NIFI_WEB_PROXY_HOST
          value: "localhost:8443,localhost:8080"
        - name: NIFI_REMOTE_INPUT_SECURE
          value: "false"
        resources:
          limits:
            memory: 2Gi
          requests:
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nifi
  namespace: ingestion
spec:
  selector:
    app: nifi
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 8443
    targetPort: 8443
    name: https
  type: LoadBalancer
