apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
      - name: metabase
        image: metabase/metabase:v0.49.14
        imagePullPolicy: IfNotPresent
        env:
        - name: MB_DB_FILE
          value: /metabase-data/metabase.db
        - name: MB_SITE_NAME
          value: Server Monitoring BI
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: metabase-data
          mountPath: /metabase-data
      volumes:
      - name: metabase-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: orchestration
spec:
  type: LoadBalancer
  selector:
    app: metabase
  ports:
  - name: http
    port: 3001
    targetPort: 3000
