apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "vdt-cluster"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka.streaming.svc.cluster.local:9092"
        - name: DYNAMIC_CONFIG_ENABLED
          value: "true"
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: streaming
spec:
  selector:
    app: kafka-ui
  ports:
  - port: 9080
    targetPort: 8080
  type: LoadBalancer
