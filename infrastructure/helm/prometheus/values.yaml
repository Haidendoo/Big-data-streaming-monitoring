# Prometheus Values
server:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
  service:
    type: LoadBalancer
    servicePort: 9090

# Grafana Datasources Configuration
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local
      access: proxy
      isDefault: true

# Extra Scrape Configs for Flink, Kafka, and Trino metrics
extraScrapeConfigs: |
  - job_name: 'flink'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: flink
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: 9249
  - job_name: 'kafka'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: kafka
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: 9404
  - job_name: 'trino'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: trino
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: 5556

# Alerting rules
serverFiles:
  alerting_rules.yml:
    groups:
      - name: lakehouse.rules
        rules:
          - alert: FlinkJobFailed
            expr: flink_jobmanager_job_status{status!="RUNNING"} > 0 or flink_jobmanager_job_status{state!="RUNNING"} > 0 or (absent(flink_jobmanager_job_status) == 1)
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Flink job {{ $labels.job_name }} stopped or failed"
              description: "Flink job is not in RUNNING state or metrics are missing."

          - alert: KafkaUnderReplicatedPartitions
            expr: kafka_server_replicamanager_underreplicatedpartitions > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Kafka partitions under-replicated"
              description: "Kafka under-replicated partitions count is {{ $value }}."

          - alert: TrinoQueryErrorRate
            expr: rate(trino_execution_query_errors_total[5m]) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High Trino query error rate"
              description: "Trino query error rate is {{ $value }} in the last 5 minutes."

# Alertmanager configuration
alertmanager:
  enabled: true
  service:
    type: LoadBalancer
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
        - match:
            severity: warning
          receiver: 'warning-alerts'

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:5000/alerts'
      - name: 'critical-alerts'
        slack_configs:
          - channel: '#alerts-critical'
            api_url: 'http://localhost/slack-critical'
            send_resolved: true
        telegram_configs:
          - bot_token: '123456789:replace-with-actual-token'
            chat_id: 987654321
            send_resolved: true
        email_configs:
          - to: 'admin@company.com'
            from: 'alertmanager@company.com'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'alertmanager@company.com'
            auth_password: 'password'
            require_tls: true
            send_resolved: true
      - name: 'warning-alerts'
        slack_configs:
          - channel: '#alerts-warning'
            api_url: 'http://localhost/slack-warning'
            send_resolved: true
        email_configs:
          - to: 'devs@company.com'
            from: 'alertmanager@company.com'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'alertmanager@company.com'
            auth_password: 'password'
            require_tls: true
            send_resolved: true
